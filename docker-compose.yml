services:
  db:
    image: postgres:15-alpine
    container_name: gamevault-db
    environment:
      POSTGRES_DB: gamelist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - gamevault-postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gamelist"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: gamevault-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      API_KEY: dev-gamevault-key
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      AUTH_TOKEN_SECRET: dev-gamevault-secret
      AUTH_TOKEN_TTL_MINUTES: 480
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gamelist
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    container_name: gamevault-prometheus
    depends_on:
      backend:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: gamevault-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - gamevault-grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  gamevault-postgres-data:
  gamevault-grafana-data:
