# Configuración exclusiva de tests: base de datos H2 en memoria.
# Sustituye a la conexión Cloud SQL del entorno real para que los tests
# corran sin infraestructura externa.
spring.datasource.url=jdbc:h2:mem:gamevault-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# API Key conocida para los tests de autenticación.
app.api-key=test-key
